name: Release

on:
  pull_request:
    branches: [main]
    types: [closed]

permissions:
  contents: write

jobs:
  # Create tag and GitHub Release when a release/* branch is merged
  create-release:
    if: github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'release/')
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from branch name
        id: version
        run: |
          BRANCH="${{ github.event.pull_request.head.ref }}"
          VERSION="${BRANCH#release/}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create tag
        run: |
          git tag "${{ steps.version.outputs.version }}"
          git push origin "${{ steps.version.outputs.version }}"

      - name: Create GitHub Release
        run: |
          gh release create "${{ steps.version.outputs.version }}" \
            --title "${{ steps.version.outputs.version }}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Build binaries for each platform and upload to the release
  build:
    needs: create-release
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../gct-${{ needs.create-release.outputs.version }}-${{ matrix.target }}.tar.gz gct
          cd ../../..

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../gct-${{ needs.create-release.outputs.version }}-${{ matrix.target }}.zip gct.exe
          cd ../../..

      - name: Upload to Release
        run: gh release upload ${{ needs.create-release.outputs.version }} gct-${{ needs.create-release.outputs.version }}-${{ matrix.target }}.*
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Update Homebrew formula after all binaries are uploaded
  update-homebrew:
    needs: [create-release, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download release archives
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.create-release.outputs.version }}
        run: |
          gh release download "$VERSION" \
            --repo katzkb/git-control-tower \
            --pattern "gct-${VERSION}-aarch64-apple-darwin.tar.gz" \
            --pattern "gct-${VERSION}-x86_64-apple-darwin.tar.gz" \
            --pattern "gct-${VERSION}-x86_64-unknown-linux-gnu.tar.gz"

      - name: Compute SHA256 hashes
        id: sha
        env:
          VERSION: ${{ needs.create-release.outputs.version }}
        run: |
          echo "arm64=$(sha256sum gct-${VERSION}-aarch64-apple-darwin.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "x86_64_mac=$(sha256sum gct-${VERSION}-x86_64-apple-darwin.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "linux=$(sha256sum gct-${VERSION}-x86_64-unknown-linux-gnu.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: katzkb/homebrew-tap
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update formula
        env:
          VERSION: ${{ needs.create-release.outputs.version }}
          SHA_ARM64: ${{ steps.sha.outputs.arm64 }}
          SHA_X86_64_MAC: ${{ steps.sha.outputs.x86_64_mac }}
          SHA_LINUX: ${{ steps.sha.outputs.linux }}
        run: |
          SEMVER="${VERSION#v}"
          sed -i "s/version \".*\"/version \"${SEMVER}\"/" Formula/gct.rb
          # Update SHA256 hashes in order: arm64, x86_64 mac, linux
          sed -i "0,/sha256 \"[a-f0-9]\{64\}\"/s//sha256 \"${SHA_ARM64}\"/" Formula/gct.rb
          sed -i "0,/sha256 \"[a-f0-9]\{64\}\"/s//sha256 \"${SHA_X86_64_MAC}\"/" Formula/gct.rb
          sed -i "0,/sha256 \"[a-f0-9]\{64\}\"/s//sha256 \"${SHA_LINUX}\"/" Formula/gct.rb
          echo "Updated formula:"
          cat Formula/gct.rb

      - name: Commit and push
        env:
          VERSION: ${{ needs.create-release.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/gct.rb
          git commit -m "chore: update gct to ${VERSION}"
          git push
